packages:
  - apps/*
  - examples/*
  - packages/*
  - tools/*

catalogMode: prefer

onlyBuiltDependencies:
  - msgpackr-extract

catalog:
  "@effect/platform-browser": 4.0.0-beta.70
  "@effect/platform-node": 4.0.0-beta.70
  "@effect/language-service": 0.86.2
  "@effect/vitest": 4.0.0-beta.70
  "@types/node": 25.9.1
  "@vitest/coverage-istanbul": 4.1.6
  "@vitest/runner": 4.1.6
  effect: 4.0.0-beta.70
  typescript: 6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.1.23
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.23
  vite-plus: 0.1.23
  "@effect/atom-react": 4.0.0-beta.70
  scheduler: 0.27.0
  vitest-browser-react: 2.2.0
  "@platformatic/kafka": 2.2.3
  "@connectrpc/connect": 2.1.2
  "@connectrpc/connect-node": 2.1.2
  "@tailwindcss/vite": 4.3.1
  "@tanstack/react-router": 1.170.16
  "@tanstack/react-start": 1.168.26
  "@tanstack/router-cli": 1.167.17
  "@tanstack/router-plugin": 1.168.18
  "@vitejs/plugin-react": 6.0.3
  tailwindcss: 4.3.1
  tsx: 4.22.4
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  esbuild: true
  msgpackr-extract: true
