name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.2.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Effect LSP diagnostics
        run: |
          pnpm exec effect-language-service diagnostics --project packages/config/tsconfig.json --format text --strict
          pnpm exec effect-language-service diagnostics --project packages/column-live-view-engine/tsconfig.json --format text --strict

      - name: Ready gate
        run: pnpm run ready
