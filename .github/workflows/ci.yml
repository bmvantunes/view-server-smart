name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Check, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.2.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install browser test dependencies
        run: pnpm --filter @view-server/react exec playwright install --with-deps chromium firefox webkit

      - name: Effect LSP diagnostics
        run: |
          pnpm exec effect-language-service diagnostics --project packages/config/tsconfig.json --format text --strict
          pnpm exec effect-language-service diagnostics --project packages/column-live-view-engine/tsconfig.json --format text --strict
          pnpm exec effect-language-service diagnostics --project packages/react/tsconfig.json --format text --strict

      - name: Ready gate
        run: pnpm run ready

  smoke-benchmarks:
    name: Smoke Benchmark Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.2.2
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26.2.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm exec vp run -r build

      - name: Install Chromium benchmark dependencies
        run: pnpm --filter @view-server/react exec playwright install --with-deps chromium

      - name: Smoke benchmark regression gate
        run: pnpm run bench:baseline:smoke

      - name: Raw read/write benchmark regression gate
        run: pnpm run bench:baseline:raw-read-write
