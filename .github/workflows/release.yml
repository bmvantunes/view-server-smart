name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Published effect-view-server version to tag after npm stage approve"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Ready and version PR
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          version: "0.2.1"
          cache: false
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install browser test dependencies
        working-directory: packages/react
        run: vp exec playwright install --with-deps chromium firefox webkit

      - name: Ready gate
        run: vp run -w ready

      - name: Create version PR
        id: changesets
        uses: changesets/action@v1
        with:
          title: "Version packages"
          commit: "Version packages"
          version: vp run -w release:version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: version
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.version.outputs.hasChangesets == 'false'
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          version: "0.2.1"
          cache: false
          run-install: false

      - name: Install dependencies
        run: vp install --frozen-lockfile

      - name: Install npm for trusted publishing
        run: npm install --global npm@11.17.0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify npm trusted publishing OIDC
        run: |
          npm --version
          node -e "if (!process.env.ACTIONS_ID_TOKEN_REQUEST_URL || !process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN) throw new Error('GitHub Actions OIDC token is unavailable. Check that the publish job has id-token: write.');"

      - name: Stage npm publish
        run: |
          vp run effect-view-server#build
          node scripts/release-publish.mjs

  finalize:
    name: Finalize approved npm stage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "26"
          version: "0.2.1"
          cache: false
          run-install: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag approved npm version
        run: node scripts/release-publish.mjs --finalize-version "${{ inputs.version }}"
